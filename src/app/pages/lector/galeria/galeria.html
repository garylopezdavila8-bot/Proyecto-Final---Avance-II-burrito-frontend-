  <a class="navbar-brand d-flex align-items-center" routerLink="/burritolector/galeria">
    <i class="bi bi-book-half me-2 text-primary"></i> <strong>El Burrito Lector</strong>
  </a>
  <div class="ms-auto d-flex gap-3 align-items-center">
    <span class="text-muted small" *ngIf="currentUser() as user">Hola, {{ user.nombre }}</span>
    <a class="nav-link text-white fw-bold" routerLink="/burritolector/galeria">Galería</a>
    <a class="nav-link text-muted" routerLink="/burritolector/dashboard">Mi Dashboard</a>
    <a class="nav-link text-muted" routerLink="/burritolector/afinidad">Afinidad</a>
    <button class="btn btn-sm btn-outline-danger" type="button" (click)="salir()">Salir</button>
  </div>
</nav>

<div class="container text-white pb-5">
  <div class="mb-4">
    <h2>Catálogo Literario</h2>
    <p class="text-muted">Explora los libros disponibles, lee reseñas y asigna puntuaciones.</p>
  </div>

  <div *ngIf="loading()" class="text-center py-5">
    <div class="spinner-border text-primary" role="status"></div>
  </div>

  <div *ngIf="errorMessage()" class="alert alert-danger">{{ errorMessage() }}</div>

  <div class="row row-cols-1 row-cols-md-3 g-4" *ngIf="!loading()">
    <div class="col" *ngFor="let libro of libros()">
      <div class="card bg-secondary text-white h-100 shadow">
        <img
          [src]="getImageUrl(libro.imagenUrl)"
          class="card-img-top"
          [alt]="libro.titulo"
          style="height: 220px; object-fit: cover"
        />
        <div class="card-body d-flex flex-column">
          <h5 class="card-title">{{ libro.titulo }}</h5>
          <h6 class="card-subtitle mb-2 text-warning">{{ libro.autor }}</h6>
          <p class="card-text small text-light flex-grow-1">{{ libro.sinopsis }}</p>
          <a class="btn btn-primary mt-3" [routerLink]="['/burritolector/libro', libro.id]">
            Ver detalle y calificar
          </a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="!loading() && libros().length === 0" class="alert alert-info">
    Aún no hay libros en el catálogo.
  </div>
</div>
